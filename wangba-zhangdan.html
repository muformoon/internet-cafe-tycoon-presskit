<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网吧青春账单</title>
<style>
  :root{
    --crt-bg:#050a06;
    --crt-panel:#0a140c;
    --phosphor:#39ff6e;
    --phosphor-dim:#1d8f42;
    --amber:#ffb000;
    --paper:#f4eeda;
    --ink:#2b261e;
    --stamp:#c8402e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--crt-bg);min-height:100%}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC","WenQuanYi Micro Hei",monospace;
    color:var(--phosphor);
    display:flex;flex-direction:column;align-items:center;
    padding:24px 12px 64px;
    font-size:19px;line-height:1.5;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0 1px,transparent 1px 3px);
  }
  .monitor{
    width:100%;max-width:560px;
    background:var(--crt-panel);
    border:2px solid var(--phosphor-dim);
    border-radius:10px;
    box-shadow:0 0 32px rgba(57,255,110,.14), inset 0 0 60px rgba(57,255,110,.05);
    padding:22px 22px 26px;
  }
  .titlebar{
    display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:1px dashed var(--phosphor-dim);
    padding-bottom:8px;margin-bottom:16px;
    font-size:15px;color:var(--phosphor-dim);
    letter-spacing:1px;
  }
  h1{
    font-size:30px;font-weight:normal;color:var(--phosphor);
    text-shadow:0 0 8px rgba(57,255,110,.55);
    margin-bottom:6px;letter-spacing:2px;
  }
  .sub{color:var(--phosphor-dim);font-size:17px;margin-bottom:20px}
  .blink{animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  @media (prefers-reduced-motion:reduce){.blink{animation:none}}

  .q{display:none}
  .q.active{display:block;animation:in .18s ease-out}
  @keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .q .label{margin-bottom:14px}
  .q .label .num{color:var(--amber)}

  .opts{display:flex;flex-wrap:wrap;gap:10px}
  .opts button{
    font-family:inherit;font-size:18px;
    background:none;border:1px solid var(--phosphor-dim);color:var(--phosphor);
    padding:9px 15px;cursor:pointer;min-width:64px;
  }
  .opts button:hover,.opts button:focus-visible{
    background:var(--phosphor);color:var(--crt-bg);outline:none;
    box-shadow:0 0 12px rgba(57,255,110,.5);
  }
  .namerow{display:flex;gap:10px}
  input[type=text]{
    font-family:inherit;font-size:19px;flex:1;min-width:0;
    background:var(--crt-bg);border:1px solid var(--phosphor-dim);color:var(--phosphor);
    padding:10px 12px;caret-color:var(--phosphor);
  }
  input[type=text]:focus{outline:none;border-color:var(--phosphor);box-shadow:0 0 10px rgba(57,255,110,.35)}
  .dice{
    font-family:inherit;font-size:18px;background:none;cursor:pointer;
    border:1px solid var(--phosphor-dim);color:var(--phosphor);padding:0 14px;
  }
  .dice:hover{background:var(--phosphor);color:var(--crt-bg)}
  .hint{color:var(--phosphor-dim);font-size:15px;margin-top:8px}
  .nav{margin-top:18px}
  .nav button{
    font-family:inherit;font-size:18px;background:none;cursor:pointer;
    border:1px solid var(--amber);color:var(--amber);padding:8px 16px;
  }
  .nav button:hover{background:var(--amber);color:var(--crt-bg)}
  .progress{margin-top:20px;color:var(--phosphor-dim);font-size:14px;letter-spacing:2px}

  #printer{display:none;width:100%;max-width:560px;margin-top:26px;text-align:center}
  #printer .slot{
    height:14px;background:#000;border:2px solid var(--phosphor-dim);
    border-radius:7px;max-width:440px;margin:0 auto;
    box-shadow:inset 0 3px 6px rgba(0,0,0,.9);
  }
  #receiptWrap{max-width:420px;margin:-4px auto 0;overflow:hidden}
  #receiptImg{
    width:100%;height:auto;display:block;
    filter:drop-shadow(0 8px 18px rgba(0,0,0,.6));
  }
  #receiptWrap.printing #receiptImg{animation:printout 2.4s cubic-bezier(.2,.7,.3,1) both}
  @keyframes printout{from{transform:translateY(-100%)}to{transform:translateY(0)}}
  @media (prefers-reduced-motion:reduce){#receiptWrap.printing #receiptImg{animation:none}}
  .savehint{color:var(--amber);font-size:15px;margin-top:12px}
  .actions{margin-top:14px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .actions button,.actions a{
    font-family:inherit;font-size:17px;text-decoration:none;display:inline-block;
    background:none;border:1px solid var(--phosphor);color:var(--phosphor);
    padding:9px 16px;cursor:pointer;
  }
  .actions .dl{border-color:var(--amber);color:var(--amber)}
  .actions .dl:hover{background:var(--amber);color:var(--crt-bg)}
  .actions button:hover,.actions a:hover{background:var(--phosphor);color:var(--crt-bg)}
  .footer{margin-top:34px;color:var(--phosphor-dim);font-size:14px;text-align:center;max-width:560px}
  .footer a{color:var(--phosphor)}
</style>
</head>
<body>

<div class="monitor">
  <div class="titlebar">
    <span>网管系统 v1.02</span>
    <span>23:47 2004-08-14</span>
  </div>

  <h1>网吧青春账单</h1>
  <div class="sub">当年在网吧烧了多少钱？30秒算出来。<span class="blink">_</span></div>

  <div class="q active" id="q0">
    <div class="label"><span class="num">[1/6]</span> 你混网吧是哪几年？</div>
    <div class="opts" id="yearOpts"></div>
  </div>

  <div class="q" id="q1">
    <div class="label"><span class="num">[2/6]</span> 一周去几天？</div>
    <div class="opts" id="dayOpts"></div>
  </div>

  <div class="q" id="q2">
    <div class="label"><span class="num">[3/6]</span> 每次待几个小时？</div>
    <div class="opts" id="hourOpts"></div>
    <div class="hint">说好"就玩一小时"的人，后来都包夜了。</div>
  </div>

  <div class="q" id="q3">
    <div class="label"><span class="num">[4/6]</span> 当年网费多少钱一小时？</div>
    <div class="opts" id="priceOpts"></div>
    <div class="hint">办会员卡还能打折的那种。</div>
  </div>

  <div class="q" id="q4">
    <div class="label"><span class="num">[5/6]</span> 你的主力游戏是？</div>
    <div class="opts" id="gameOpts"></div>
  </div>

  <div class="q" id="q5">
    <div class="label"><span class="num">[6/6]</span> 网吧叫什么名字？（会印在小票上）</div>
    <div class="namerow">
      <input type="text" id="cafeName" maxlength="14" placeholder="飞宇网吧">
      <button class="dice" onclick="rollName()" title="随机">🎲</button>
    </div>
    <div class="hint">不填的话，我们帮你起一个。</div>
    <div class="nav">
      <button onclick="printReceipt()">&gt;&gt; 打印小票</button>
    </div>
  </div>

  <div class="progress" id="progress">■□□□□□</div>
</div>

<div id="printer">
  <div class="slot"></div>
  <div id="receiptWrap"><img id="receiptImg" alt="网吧小票"></div>
  <div class="savehint">📱 长按小票图片 → 保存到相册 / 直接发给老网友</div>
  <div class="actions">
    <button class="dl" id="shareBtn" onclick="sharePNG()" style="display:none">📤 保存 / 分享小票</button>
    <button class="dl" id="dlBtn" onclick="downloadPNG()">下载图片 (PNG)</button>
    <button onclick="restart()">再来一次</button>
    <a href="https://muformoon.github.io/internet-cafe-tycoon-presskit/play/" target="_blank" rel="noopener">去看看这款游戏 →</a>
  </div>
</div>

<div class="footer">
  这家网吧，换你来开 →
  <a href="https://muformoon.github.io/internet-cafe-tycoon-presskit/play/" target="_blank" rel="noopener">Internet Cafe Tycoon（Steam / App Store）</a>
</div>

<canvas id="rc" width="760" height="100" style="display:none"></canvas>

<script>
"use strict";
const state = { years:null, days:null, hours:null, price:null, game:null, baoye:false };
let step = 0;
const TOTAL_Q = 6;

const YEAR_OPTS = [
  ['2000–2005','2000-2005',5],
  ['2003–2008','2003-2008',6],
  ['2005–2012','2005-2012',7],
  ['2008–2015','2008-2015',7],
  ['全都有我','2000-2015',15]
];
const DAY_OPTS = [['1-2天',1.5],['3-4天',3.5],['5-6天',5.5],['天天报到',7]];
const HOUR_OPTS = [['1-2小时',1.5,false],['3-4小时',3.5,false],['5-6小时',5.5,false],['包夜！',10,true]];
const PRICE_OPTS = [['1元',1],['1.5元',1.5],['2元',2],['3元',3],['5元',5]];
const GAME_OPTS = ['CS 1.6','穿越火线','传奇','魔兽世界','梦幻西游','劲舞团','都玩过','地下城与勇士'];
const CAFE_NAMES = ['飞宇网吧','光速网吧','星际网络会所','蓝天网吧','极速网城','黑马网吧','银河网咖'];
const RANKS = [[500,'萌新上网'],[2000,'夜猫子'],[5000,'网吧钉子户'],[Infinity,'传奇网瘾少年']];

// QR matrix for https://muformoon.github.io/internet-cafe-tycoon-presskit/play/ (EC=M), generated offline
const QR = ["1111111010011001011010101110101111111", "1000001010011000101111111100101000001", "1011101001110100100010100111001011101", "1011101011100000110100101110001011101", "1011101000010101110101000011101011101", "1000001001000111100101000100001000001", "1111111010101010101010101010101111111", "0000000010000100111111000011100000000", "1011011101010001100110000011101001011", "1100110011100111100000000100000101010", "1111001010000101011000000100001001100", "0000000110111111001100011100010101100", "0110101110111010010010111101011011111", "1000010000111101001100001111101111011", "1001011001001110011110101110010010110", "0111010010110111111011100001111110011", "1000001111101100111010011101100101111", "0010010001101010100111000001011001011", "1010111010100101100100100111111000111", "0010000101000100010100110010000011010", "1011001110100000110001101011110110001", "0101000101100000101110010000100001010", "0110001111000100010011110010010100000", "0001010100100101001111100111111011100", "1011001101101011001011111111011110111", "0010000111110000101011011001101111111", "0101001001111001101111010010010001010", "1001100001000100100001110010000110010", "0010011110101101001001100101111110101", "0000000010110001010010111001100010111", "1111111010110101110001001000101010111", "1000001010111010000100111001100010000", "1011101001001010001000100000111111011", "1011101010000111001010101100111010110", "1011101011111010100110011011111010110", "1000001000110000101010011110000110100", "1111111011110001010100110110010011111"];

function optBtn(label, onclick){
  const b = document.createElement('button');
  b.textContent = label;
  b.onclick = onclick;
  return b;
}
function build(){
  const y=document.getElementById('yearOpts');
  YEAR_OPTS.forEach(([lab,val,yrs])=>y.appendChild(optBtn(lab,()=>{state.years={label:val,count:yrs};next();})));
  const d=document.getElementById('dayOpts');
  DAY_OPTS.forEach(([lab,val])=>d.appendChild(optBtn(lab,()=>{state.days=val;next();})));
  const h=document.getElementById('hourOpts');
  HOUR_OPTS.forEach(([lab,val,by])=>h.appendChild(optBtn(lab,()=>{state.hours=val;state.baoye=by;next();})));
  const p=document.getElementById('priceOpts');
  PRICE_OPTS.forEach(([lab,val])=>p.appendChild(optBtn(lab,()=>{state.price=val;next();})));
  const g=document.getElementById('gameOpts');
  GAME_OPTS.forEach(lab=>g.appendChild(optBtn(lab,()=>{state.game=lab;next();})));
}
function showStep(i){
  document.querySelectorAll('.q').forEach((q,idx)=>q.classList.toggle('active',idx===i));
  let bar='';
  for(let k=0;k<TOTAL_Q;k++) bar += k<=i ? '■' : '□';
  document.getElementById('progress').textContent = bar;
  if(i===5){
    const inp=document.getElementById('cafeName');
    if(!inp.value) inp.value = CAFE_NAMES[Math.floor(Math.random()*CAFE_NAMES.length)];
    setTimeout(()=>inp.focus(),60);
  }
}
function next(){ step=Math.min(step+1,TOTAL_Q-1); showStep(step); }
function rollName(){
  const inp=document.getElementById('cafeName');
  let n;
  do{ n=CAFE_NAMES[Math.floor(Math.random()*CAFE_NAMES.length)]; }while(n===inp.value);
  inp.value=n;
}
function fmt(n){ return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,','); }

function compute(){
  const weeks = state.years.count*52;
  const totalHours = Math.round(weeks*state.days*state.hours);
  const totalRMB = Math.round(totalHours*state.price);
  const milkTeas = Math.round(totalRMB/15);           // ≈15元一杯奶茶
  const iceTeas  = Math.round(totalHours/2);           // 两小时一瓶冰红茶
  const noodles  = Math.round(totalHours/5);           // 五小时一桶泡面
  const baoyeN   = state.baoye ? Math.round(weeks*state.days) : 0;
  let rank = RANKS[RANKS.length-1][1];
  for(const [lim,name] of RANKS){ if(totalHours<lim){ rank=name; break; } }
  return { totalHours, totalRMB, milkTeas, iceTeas, noodles, baoyeN, rank };
}
function getCafeName(){
  const raw=document.getElementById('cafeName').value.trim();
  return raw || CAFE_NAMES[Math.floor(Math.random()*CAFE_NAMES.length)];
}

let lastData=null;

function printReceipt(){
  lastData={...compute(),cafe:getCafeName()};
  renderReceipt();
  const pr=document.getElementById('printer');
  pr.style.display='block';
  const wrap=document.getElementById('receiptWrap');
  wrap.classList.remove('printing');
  void wrap.offsetWidth;
  wrap.classList.add('printing');
  pr.scrollIntoView({behavior:'smooth',block:'start'});
}

function renderReceipt(){
  if(!lastData) return;
  const d=lastData;
  const W=760, PAD=46;
  const cv=document.getElementById('rc');
  const ctx=cv.getContext('2d');

  const cjkMono='"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",monospace';
  const mono=(px,bold)=>(bold?'bold ':'')+px+'px '+cjkMono;
  const lines=[];
  const push=(txt,opt={})=>lines.push({txt,size:opt.size||26,bold:!!opt.bold,align:opt.align||'left',gap:opt.gap||38,right:opt.right||null,color:opt.color||null});

  const div='- - - - - - - - - - - - - - - -';
  const ddiv='================================';

  push(d.cafe,{size:42,bold:true,align:'center',gap:52});
  push('会员卡号: '+(10000+Math.floor(Math.random()*89999)),{size:20,align:'center',gap:30});
  push('*** 顾客消费清单 ***',{size:24,align:'center',gap:38});
  push(ddiv,{align:'center',gap:34});
  push('上网时期',{right:state.years.label,gap:38});
  push('每周到店',{right:(state.days===7?'天天报到':state.days+' 天'),gap:38});
  push('单次时长',{right:state.hours+' 小时',gap:38});
  push('网费单价',{right:state.price+' 元/小时',gap:38});
  push('主力游戏',{right:d.cafe.length>10?state.game:state.game,gap:38});
  push(div,{align:'center',gap:34});
  push('总计时长',{right:fmt(d.totalHours)+' 小时',gap:38});
  push('冰红茶（估）',{right:fmt(d.iceTeas)+' 瓶',gap:38});
  push('泡面（估）',{right:fmt(d.noodles)+' 桶',gap:38});
  if(d.baoyeN>0) push('包夜次数（估）',{right:fmt(d.baoyeN)+' 次',gap:38});
  push(div,{align:'center',gap:42});
  push('消费总计',{size:24,gap:36});
  push('¥ '+fmt(d.totalRMB),{size:48,bold:true,align:'center',gap:54});
  push('≈ 现在的 '+fmt(d.milkTeas)+' 杯奶茶',{size:20,align:'center',gap:42});
  push(ddiv,{align:'center',gap:42});
  push('顾客等级：',{size:22,align:'center',gap:34});
  push('★ '+d.rank+' ★',{size:36,bold:true,align:'center',gap:50,color:'#c8402e'});
  push('网管说：下次记得续费',{size:20,align:'center',gap:46});
  push('这家网吧，换你来开：',{size:20,align:'center',gap:32});
  push('INTERNET CAFE TYCOON',{size:28,bold:true,align:'center',gap:36});
  push('Steam / App Store 现已发售',{size:20,align:'center',gap:30});

  // measure height: lines + QR block
  let H=70;
  lines.forEach(l=>H+=l.gap+(l.size>26?l.size-20:0));
  const QR_SIZE=170, QR_PAD=18;
  H += QR_SIZE + QR_PAD + 46 + 60; // qr + caption + bottom margin

  cv.width=W; cv.height=H;

  // paper
  ctx.fillStyle='#f4eeda';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,0.018)';
  for(let y=0;y<H;y+=7) ctx.fillRect(0,y,W,3);
  // jagged edges
  ctx.fillStyle='#050a06';
  ctx.beginPath(); ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=20){ctx.lineTo(x+10,H-14);ctx.lineTo(x+20,H);}
  ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0,0);
  for(let x=0;x<=W;x+=20){ctx.lineTo(x+10,10);ctx.lineTo(x+20,0);}
  ctx.closePath(); ctx.fill();

  // text
  let y=82;
  lines.forEach(l=>{
    ctx.font=mono(l.size,l.bold);
    ctx.fillStyle=l.color||'#2b261e';
    if(l.right){
      ctx.textAlign='left'; ctx.fillText(l.txt,PAD,y);
      ctx.textAlign='right'; ctx.fillText(l.right,W-PAD,y);
    }else{
      ctx.textAlign=l.align==='center'?'center':'left';
      ctx.fillText(l.txt,l.align==='center'?W/2:PAD,y);
    }
    y+=l.gap+(l.size>26?l.size-20:0);
  });

  // QR code (centered)
  const n=QR.length, cell=Math.floor(QR_SIZE/n), qs=cell*n;
  const qx=Math.round((W-qs)/2), qy=y;
  ctx.fillStyle='#fff';
  ctx.fillRect(qx-10,qy-10,qs+20,qs+20);
  ctx.fillStyle='#2b261e';
  for(let r=0;r<n;r++){
    for(let c=0;c<n;c++){
      if(QR[r][c]==='1') ctx.fillRect(qx+c*cell,qy+r*cell,cell,cell);
    }
  }
  ctx.font=mono(20,false);
  ctx.fillStyle='#2b261e';
  ctx.textAlign='center';
  ctx.fillText('扫码开玩（Steam / iOS）',W/2,qy+qs+34);

  // red date stamp
  ctx.save();
  ctx.translate(W-150,150);
  ctx.rotate(-0.14);
  ctx.globalAlpha=0.55;
  ctx.strokeStyle='#c8402e';
  ctx.lineWidth=3;
  ctx.strokeRect(-82,-26,164,52);
  ctx.fillStyle='#c8402e';
  ctx.font=mono(22,true);
  ctx.textAlign='center';
  ctx.fillText(state.years.label.split('-')[0]+'-09-01',0,8);
  ctx.restore();

  // to long-pressable image (WeChat-friendly)
  document.getElementById('receiptImg').src=cv.toDataURL('image/png');
}

function downloadPNG(){
  const a=document.createElement('a');
  a.download='wangba-qingchun-zhangdan.png';
  a.href=document.getElementById('rc').toDataURL('image/png');
  a.click();
}
function restart(){
  step=0; showStep(0);
  document.getElementById('printer').style.display='none';
  document.getElementById('cafeName').value='';
  window.scrollTo({top:0,behavior:'smooth'});
}


async function sharePNG(){
  try{
    const cv=document.getElementById('rc');
    const blob=await new Promise(res=>cv.toBlob(res,'image/png'));
    const file=new File([blob],'wangba-zhangdan.png',{type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'网吧青春账单'});
    }else{
      downloadPNG();
    }
  }catch(e){ /* user cancelled share sheet — ignore */ }
}
// Mobile: prefer share button (goes to gallery/apps); desktop: plain download
(function(){
  const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  const canShareFiles=!!(navigator.canShare&&navigator.share);
  if(isMobile){
    document.getElementById('dlBtn').style.display='none';
    if(canShareFiles) document.getElementById('shareBtn').style.display='inline-block';
    // if no share support, long-press hint (already visible) is the path
  }
})();

build();
showStep(0);
</script>
</body>
</html>
