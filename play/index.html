<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internet Cafe Tycoon — 选择平台 / Choose Platform</title>
<meta property="og:title" content="Internet Cafe Tycoon">
<meta property="og:description" content="开一家属于你的网吧 — Run your own 2000s internet café.">
<style>
  :root{
    --crt-bg:#050a06;
    --crt-panel:#0a140c;
    --phosphor:#39ff6e;
    --phosphor-dim:#1d8f42;
    --amber:#ffb000;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--crt-bg);min-height:100%}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",monospace;
    color:var(--phosphor);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:20px;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0 1px,transparent 1px 3px);
  }
  .card{
    width:100%;max-width:420px;
    background:var(--crt-panel);
    border:2px solid var(--phosphor-dim);
    border-radius:10px;
    box-shadow:0 0 32px rgba(57,255,110,.14), inset 0 0 60px rgba(57,255,110,.05);
    padding:34px 28px;
    text-align:center;
  }
  h1{
    font-size:26px;font-weight:normal;letter-spacing:1px;
    text-shadow:0 0 8px rgba(57,255,110,.55);
    margin-bottom:6px;
  }
  .sub{color:var(--phosphor-dim);font-size:16px;margin-bottom:8px}
  .sub-en{color:var(--phosphor-dim);font-size:13px;margin-bottom:28px;opacity:.8}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;padding:16px;margin-bottom:14px;
    border:1px solid var(--phosphor);color:var(--phosphor);
    text-decoration:none;font-size:19px;font-family:inherit;
    transition:none;
  }
  .btn:hover{background:var(--phosphor);color:var(--crt-bg);box-shadow:0 0 14px rgba(57,255,110,.5)}
  .btn.apple{border-color:var(--amber);color:var(--amber)}
  .btn.apple:hover{background:var(--amber);color:var(--crt-bg)}
  .btn small{font-size:13px;opacity:.75}
  .foot{margin-top:18px;color:var(--phosphor-dim);font-size:12px;letter-spacing:1px}
</style>
</head>
<body>
  <div class="card">
    <h1>INTERNET CAFE TYCOON</h1>
    <div class="sub">开一家属于你的网吧</div>
    <div class="sub-en">Run your own 2000s internet café</div>

    <a class="btn" href="https://s.team/a/4636050">
      <span>🖥️ Steam（PC / Mac）</span>
    </a>
    <a class="btn apple" href="https://apps.apple.com/app/id6784676728">
      <span>📱 App Store（iOS）</span>
    </a>

    <div class="foot">CAFE-OS v1.02 · 23:47 2004-08-14</div>
  </div>
</body>
</html>
